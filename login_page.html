<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="login_page.css" rel="stylesheet">
</head>
<body onclick="document.getElementById('bgMusic').play()">
    <div class="container-fluid">
        <div class="centered-div">
           <form> 
            <p class="text-center w-100"><b>INPUT TO THE FOLLOWING FIELDS</b></p><br>
            
            <p class="w-100"> NAME: <input type="text" required   class="form-control" placeholder="name" id="name"></p>
            <p class="w-100"> AGE: <input type="text" required   class="form-control" placeholder="age" id="age"></p>
            <p class="w-100"> EMAIL: <input type="email" required class="form-control" placeholder="EMAIL" id="EMAIL" ></p>
            
            <p class="w-100 mb-0">SEX:</p>
            <div class="radio-group w-100 border-0 h-auto p-0 flex-row justify-content-start"> 
                <div class="form-check border-0 h-auto p-0 me-3">
                    <input class="form-check-input" type="radio" name="sex" id="male" value="Male">
                    <label class="form-check-label ms-1" for="male">Male</label>
                </div>
                <div class="form-check border-0 h-auto p-0">
                    <input class="form-check-input" type="radio" name="sex" id="female" value="Female">
                    <label class="form-check-label ms-1" for="female">Female</label>
                </div>
            </div>
            
            <p class="w-100 mt-3">DOB <input type="date" class="form-control" required> </p>
            
            <button type="submit" class="submit-btn btn shadow-sm" onclick="document.getElementById('chaching').play()">SUBMIT</button>
         </form>
        </div>
    </div>

    <audio id="bgMusic" src="hpm.webm" loop></audio>
    <audio id="chaching"  src="chg.m4a"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
